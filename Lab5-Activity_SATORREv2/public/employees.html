<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employees - Full-Stack App</title>
  <link rel="stylesheet" href="FullStack.css">
</head>

<body style="margin: 0; font-family: sans-serif; background-color: #fafafa;">
  <div id="toast-container"></div>

  <nav
    style="display: flex; justify-content: space-between; align-items: center; padding: 10px clamp(16px, 4vw, 40px); background: #222; color: white; box-shadow: 5px 5px 10px 2px rgba(77, 77, 77, 1); position: relative; z-index: 1000; flex-wrap: wrap; gap: 8px;">
    <a href="home.html"
      style="color: white; text-decoration: none; font-size: clamp(0.75rem, 2vw, 1rem); flex-shrink: 1; min-width: 0;">Full-Stack
      App (LANCE TIMOTHY SATORRE)</a>

    <div style="display: flex; justify-content: center; align-items: center; padding: 5px; flex-shrink: 0;">
      <ul id="logged-out-nav" style="list-style: none; display: flex; gap: 15px; margin: 0; padding: 0;">
        <li><a href="login.html"
            style="color: white; text-decoration: none; font-size: clamp(0.8rem, 2vw, 1rem);">Login</a></li>
        <li><a href="register.html"
            style="color: white; text-decoration: none; font-size: clamp(0.8rem, 2vw, 1rem);">Register</a>
        </li>
      </ul>

      <ul id="logged-in-nav" style="list-style: none; display: none; margin: 0; padding: 0; position: relative;">
        <li>
          <div id="user-dropdown-toggle"
            style="color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold;">
            <span id="nav-user-name" style="font-size: clamp(0.8rem, 2vw, 1rem);"></span>
            <span style="font-size: 0.8em;">▼</span>
          </div>

          <div id="user-dropdown-menu"
            style="display: none; position: absolute; top: 35px; right: 0; background: white; border-radius: 5px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); width: 160px; overflow: hidden; font-size: 14px; text-align: left; z-index: 9999;">
            <a href="profile.html"
              style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Profile</a>

            <div id="admin-links" style="display: none;">
              <a href="employees.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Employees</a>
              <a href="accounts.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Accounts</a>
              <a href="departments.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Departments</a>
            </div>

            <a href="requests.html" id="nav-requests-link"
              style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">
              <span id="nav-requests-label">My Requests</span>
            </a>
            <a href="#" id="logout-btn"
              style="display: block; padding: 10px 15px; color: #A30000; text-decoration: none;">Logout</a>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <main
    style="margin-top: 1rem; min-height: 90vh; width: 100%; display: flex; justify-content: center; align-items: flex-start; padding: 20px clamp(12px, 3vw, 40px); background-color: #c9c7c7; box-sizing: border-box;">

    <section id="employees-page"
      style="display: block; width: 100%; max-width: 800px; margin: 0 auto; border: 2px solid gray; padding: clamp(14px, 4vw, 20px); border-radius: 20px; box-shadow: 5px 5px 10px 2px rgba(77, 77, 77, 0.2); box-sizing: border-box;">
      <div
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h2 style="margin: 0; font-size: clamp(1.4rem, 5vw, 2rem);">Employees</h2>
        <button id="show-add-employee-btn"
          style="background: #2E8B57; color: white; border: none; border-radius: 5px; padding: 8px 16px; cursor: pointer; font-weight: bold;">+
          Add Employee</button>
      </div>

      <div style="overflow-x: auto; margin-bottom: 30px;">
        <table class="page-table"
          style="width: 100%; border-collapse: collapse; background: white; border: 1px solid #1c1a1a; border-radius: 8px; min-width: 480px;">
          <thead>
            <tr style="border-bottom: 2px solid #ddd; text-align: left;">
              <th style="padding: 12px; font-weight: bold;">ID</th>
              <th style="padding: 12px; font-weight: bold;">Name</th>
              <th style="padding: 12px; font-weight: bold;">Position</th>
              <th style="padding: 12px; font-weight: bold;">Dept</th>
              <th style="padding: 12px; font-weight: bold;">Actions</th>
            </tr>
          </thead>
          <tbody id="employees-table-body"></tbody>
        </table>
      </div>

      <div id="employee-form-container"
        style="display: none; border: 1px solid #ddd; border-radius: 5px; background: white; overflow: hidden;">
        <div
          style="background: #f5f5f5; padding: 12px 15px; border-bottom: 1px solid #ddd; font-weight: bold; color: #333;">
          Add/Edit Employee
        </div>
        <form id="employeeForm"
          style="padding: clamp(12px, 3vw, 20px); display: flex; flex-direction: column; gap: 15px;">
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 14px; color: #333;">Employee ID</label>
            <input type="text" id="emp-id" required
              style="border: 1px solid #ccc; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box;">
          </div>
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 14px; color: #333;">User Email</label>
            <input type="email" id="emp-email" required
              style="border: 1px solid #ccc; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box;">
          </div>
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 14px; color: #333;">Position</label>
            <input type="text" id="emp-position" required
              style="border: 1px solid #ccc; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box;">
          </div>
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 14px; color: #333;">Department</label>
            <select id="emp-dept" required
              style="border: 1px solid #ccc; border-radius: 4px; padding: 8px; background: white; width: 100%; box-sizing: border-box;"></select>
          </div>
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 14px; color: #333;">Hire Date</label>
            <input type="date" id="emp-hire-date" required
              style="border: 1px solid #ccc; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box;">
          </div>
          <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
            <button type="submit"
              style="background: #2E8B57; color: white; border: none; border-radius: 4px; padding: 10px 20px; cursor: pointer;">Save</button>
            <button type="button" id="cancel-employee-btn"
              style="background: white; color: #A30000; border: 1px solid #A30000; border-radius: 4px; padding: 8px 16px; cursor: pointer;">Cancel</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="employee-view-modal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; padding: 16px; box-sizing: border-box;">
    <div
      style="background: white; width: min(450px, 92vw); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
      <div
        style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee;">
        <h3 style="margin: 0;">Employee Details</h3>
        <span class="close-emp-modal" style="cursor: pointer; font-size: 20px; color: #999;">&times;</span>
      </div>
      <div style="padding: clamp(14px, 4vw, 20px);">
        <p style="margin: 10px 0;"><strong>ID:</strong> <span id="emp-view-id"></span></p>
        <p style="margin: 10px 0;"><strong>Name:</strong> <span id="emp-view-name"></span></p>
        <p style="margin: 10px 0;"><strong>Position:</strong> <span id="emp-view-position"></span></p>
        <p style="margin: 10px 0;"><strong>Department:</strong> <span id="emp-view-dept"></span></p>
        <p style="margin: 10px 0;"><strong>Hire Date:</strong> <span id="emp-view-hiredate"></span></p>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button class="close-emp-modal"
            style="background: white; color: #3B3B3B; border: 1px solid #3B3B3B; border-radius: 4px; padding: 8px 16px; cursor: pointer;">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.location.hash = '#/employees';
  </script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="FullStack.js"></script>
</body>

</html>
