<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    (function () {
      var target = '/home.html#/';
      if (window.location.pathname.toLowerCase().indexOf('/public/') >= 0) {
        target = './home.html#/';
      }
      window.location.replace(target);
    })();
  </script>
</head>

<body>
  <p>Redirecting...</p>
</body>

</html>
