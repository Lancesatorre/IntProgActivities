<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Full-Stack App</title>
  <link rel="stylesheet" href="FullStack.css">
</head>

<body style="margin: 0; font-family: sans-serif; background-color: #fafafa;">
  <div id="toast-container"></div>
  <nav
    style="display: flex; justify-content: space-between; align-items: center; padding: 10px clamp(16px, 4vw, 40px); background: #222; color: white; box-shadow: 5px 5px 10px 2px rgba(77, 77, 77, 1); position: relative; z-index: 1000; flex-wrap: wrap; gap: 8px;">
    <a href="home.html"
      style="color: white; text-decoration: none; font-size: clamp(0.75rem, 2vw, 1rem); flex-shrink: 1; min-width: 0;">Full-Stack
      App (LANCE TIMOTHY SATORRE)</a>
    <div style="display: flex; justify-content: center; align-items: center; padding: 5px; flex-shrink: 0;">
      <ul id="logged-out-nav" style="list-style: none; display: flex; gap: 15px; margin: 0; padding: 0;">
        <li><a href="login.html"
            style="color: white; text-decoration: none; font-size: clamp(0.8rem, 2vw, 1rem);">Login</a></li>
        <li><a href="register.html"
            style="color: white; text-decoration: none; font-size: clamp(0.8rem, 2vw, 1rem);">Register</a>
        </li>
      </ul>
      <ul id="logged-in-nav" style="list-style: none; display: none; margin: 0; padding: 0; position: relative;">
        <li>
          <div id="user-dropdown-toggle"
            style="color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold;">
            <span id="nav-user-name" style="font-size: clamp(0.8rem, 2vw, 1rem);"></span>
            <span style="font-size: 0.8em;">▼</span>
          </div>
          <div id="user-dropdown-menu"
            style="display: none; position: absolute; top: 35px; right: 0; background: white; border-radius: 5px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); width: 160px; overflow: hidden; font-size: 14px; text-align: left; z-index: 9999;">
            <a href="profile.html"
              style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Profile</a>
            <div id="admin-links" style="display: none;">
              <a href="employees.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Employees</a>
              <a href="accounts.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Accounts</a>
              <a href="departments.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Departments</a>
            </div>
            <a href="requests.html" id="nav-requests-link"
              style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">
              <span id="nav-requests-label">My Requests</span>
            </a>
            <a href="#" id="logout-btn"
              style="display: block; padding: 10px 15px; color: #A30000; text-decoration: none;">Logout</a>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <main
    style="margin-top: 1rem; min-height: 90vh; width: 100%; display: flex; justify-content: center; align-items: flex-start; padding: 20px clamp(12px, 3vw, 40px); background-color: #c9c7c7; box-sizing: border-box;">
    <section id="profile-page"
      style="display: block; width: 100%; max-width: 600px; margin: 0 auto; border: 2px solid gray; padding: clamp(14px, 4vw, 20px); border-radius: 20px; box-shadow: 5px 5px 10px 2px rgba(77, 77, 77, 0.2); box-sizing: border-box;">
      <h2 style="margin-bottom: 20px; font-size: clamp(1.4rem, 5vw, 2rem); color: black; margin: 0 0 20px;">My
        Profile</h2>
      <div id="profile-details-container"
        style="padding: clamp(12px, 3vw, 20px); border: 1px solid #1c1a1a; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); background: white;">
        <h3 id="profile-name" style="margin-top: 0; margin-bottom: 15px; font-size: clamp(1.1rem, 3vw, 1.5rem);"></h3>
        <hr>
        <p style="margin-bottom: 10px; font-size: clamp(0.85rem, 2vw, 1rem);"><strong>Email:</strong> <span
            id="profile-email"></span></p>
        <p style="margin-bottom: 20px; font-size: clamp(0.85rem, 2vw, 1rem);"><strong>Role:</strong> <span
            id="profile-role" style="text-transform: capitalize;"></span></p>
        <button id="edit-profile-btn"
          style="background: #2E8B57; color: white; border: 1px solid gray; border-radius: 4px; padding: 8px 16px; cursor: pointer; font-weight: bold;">Edit
          Profile</button>
      </div>

      <div id="edit-profile-form-container"
        style="display: none; margin-top: 20px; border: 1px solid #ddd; border-radius: 5px; background: white; overflow: hidden;">
        <div
          style="background: #f5f5f5; padding: 12px 15px; border-bottom: 1px solid #ddd; font-weight: bold; color: #333;">
          Edit Profile
        </div>
        <form id="editProfileForm"
          style="padding: clamp(12px, 3vw, 20px); display: flex; flex-direction: column; gap: 15px;">
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 14px; color: #333;">First Name</label>
            <input type="text" id="edit-profile-first" required
              style="border: 1px solid #ccc; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box;">
          </div>
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 14px; color: #333;">Last Name</label>
            <input type="text" id="edit-profile-last" required
              style="border: 1px solid #ccc; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box;">
          </div>
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 14px; color: #333;">Password</label>
            <input type="password" id="edit-profile-password" required
              style="border: 1px solid #ccc; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box;">
          </div>
          <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
            <button type="submit"
              style="background: #2E8B57; color: white; border: none; border-radius: 4px; padding: 10px 20px; cursor: pointer;">Save
              Changes</button>
            <button type="button" id="cancel-edit-profile-btn"
              style="background: white; color: #A30000; border: 1px solid #A30000; border-radius: 4px; padding: 8px 16px; cursor: pointer;">Cancel</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script>window.location.hash = '#/profile';</script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="FullStack.js"></script>
</body>

</html>
