<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requests - Full-Stack App</title>
  <link rel="stylesheet" href="FullStack.css">
</head>

<body style="margin: 0; font-family: sans-serif; background-color: #fafafa;">
  <div id="toast-container"></div>
  <nav
    style="display: flex; justify-content: space-between; align-items: center; padding: 10px clamp(16px, 4vw, 40px); background: #222; color: white; box-shadow: 5px 5px 10px 2px rgba(77, 77, 77, 1); position: relative; z-index: 1000; flex-wrap: wrap; gap: 8px;">
    <a href="home.html"
      style="color: white; text-decoration: none; font-size: clamp(0.75rem, 2vw, 1rem); flex-shrink: 1; min-width: 0;">Full-Stack
      App (LANCE TIMOTHY SATORRE)</a>
    <div style="display: flex; justify-content: center; align-items: center; padding: 5px; flex-shrink: 0;">
      <ul id="logged-out-nav" style="list-style: none; display: flex; gap: 15px; margin: 0; padding: 0;">
        <li><a href="login.html"
            style="color: white; text-decoration: none; font-size: clamp(0.8rem, 2vw, 1rem);">Login</a></li>
        <li><a href="register.html"
            style="color: white; text-decoration: none; font-size: clamp(0.8rem, 2vw, 1rem);">Register</a>
        </li>
      </ul>
      <ul id="logged-in-nav" style="list-style: none; display: none; margin: 0; padding: 0; position: relative;">
        <li>
          <div id="user-dropdown-toggle"
            style="color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold;">
            <span id="nav-user-name" style="font-size: clamp(0.8rem, 2vw, 1rem);"></span>
            <span style="font-size: 0.8em;">▼</span>
          </div>
          <div id="user-dropdown-menu"
            style="display: none; position: absolute; top: 35px; right: 0; background: white; border-radius: 5px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); width: 160px; overflow: hidden; font-size: 14px; text-align: left; z-index: 9999;">
            <a href="profile.html"
              style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Profile</a>
            <div id="admin-links" style="display: none;">
              <a href="employees.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Employees</a>
              <a href="accounts.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Accounts</a>
              <a href="departments.html"
                style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">Departments</a>
            </div>
            <a href="requests.html" id="nav-requests-link"
              style="display: block; padding: 10px 15px; color: black; text-decoration: none; border-bottom: 1px solid #f0f0f0;">
              <span id="nav-requests-label">My Requests</span>
            </a>
            <a href="#" id="logout-btn"
              style="display: block; padding: 10px 15px; color: #A30000; text-decoration: none;">Logout</a>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <main
    style="margin-top: 1rem; min-height: 90vh; width: 100%; display: flex; justify-content: center; align-items: flex-start; padding: 20px clamp(12px, 3vw, 40px); background-color: #c9c7c7; box-sizing: border-box;">
    <section id="requests-page"
      style="display: block; width: 100%; max-width: 800px; margin: 0 auto; border: 2px solid gray; padding: clamp(14px, 4vw, 20px); border-radius: 20px; box-shadow: 5px 5px 10px 2px rgba(77, 77, 77, 0.2); box-sizing: border-box;">
      <div
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h2 id="requests-page-title" style="margin: 0; font-size: clamp(1.4rem, 5vw, 2rem);">My Requests</h2>
        <button id="show-new-request-btn"
          style="background: #2E8B57; color: white; border: none; border-radius: 5px; padding: 8px 16px; cursor: pointer; font-weight: bold;">
          New Request</button>
      </div>

      <div id="requests-empty-state" style="display: none; text-align: left;"></div>

      <div style="overflow-x: auto; max-height: 420px; overflow-y: auto;">
        <table id="requests-table" class="page-table"
          style="width: 100%; border-collapse: collapse; background: white; display: none; border: 1px solid #1c1a1a; border-radius: 8px; min-width: 320px;">
          <thead>
            <tr style="border-bottom: 2px solid #ddd; text-align: left; background: #f8f9fa;">
              <th style="padding: 12px;">Type</th>
              <th style="padding: 12px;">Items Count</th>
              <th style="padding: 12px;">Status</th>
              <th style="padding: 12px;">Actions</th>
            </tr>
          </thead>
          <tbody id="requests-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="request-modal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; padding: 16px; box-sizing: border-box;">
    <div
      style="background: white; width: min(450px, 92vw); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); position: relative;">
      <div
        style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee;">
        <h3 style="margin: 0;">New Request</h3>
        <span id="close-modal" style="cursor: pointer; font-size: 20px; color: #999;">&times;</span>
      </div>
      <form id="requestForm" style="padding: clamp(14px, 4vw, 20px);">
        <div style="margin-bottom: 15px;">
          <label style="display: block; font-size: 14px; margin-bottom: 5px;">Type</label>
          <input type="text" id="req-type" value="Equipment" required
            style="width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 8px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 10px;">
          <label style="display: block; font-size: 14px; margin-bottom: 5px;">Items</label>
          <div id="items-container" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
        <button type="submit"
          style="background: #2E8B57; color: white; border: none; border-radius: 5px; padding: 8px 16px; width: auto; cursor: pointer; font-weight: bold;">Submit
          Request</button>
      </form>
    </div>
  </div>

  <script>window.location.hash = '#/requests';</script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="FullStack.js"></script>
</body>

</html>
